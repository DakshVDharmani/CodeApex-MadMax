<style>

  pointer-events: none; z-index: 0; opacity: 0.5;
}

  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
}

.bg-white { background: var(--surface); }
.bg-gray-100 { background: var(--surface2); }

.bg-red-50 { background: rgba(248, 113, 113, 0.1); }

.text-yellow-600 { color: var(--warn); }
.text-yellow-700 { color: var(--warn); }

.text-yellow-900 { color: var(--warn); }
.text-green-500 { color: var(--safe); }
.text-green-600 { color: var(--safe); }
.text-green-700 { color: var(--safe); }
.text-green-800 { color: var(--safe); }
.text-green-900 { color: var(--safe); }
.text-purple-500 { color: #8b5cf6; }
.text-purple-600 { color: #8b5cf6; }
.text-purple-700 { color: #8b5cf6; }

.text-purple-900 { color: #8b5cf6; }
.text-blue-500 { color: var(--accent); }
.text-blue-600 { color: var(--accent); }

.text-blue-800 { color: var(--accent); }
.text-blue-900 { color: var(--accent); }
.text-orange-500 { color: #fb923c; }
.text-orange-600 { color: #fb923c; }
.text-orange-700 { color: #fb923c; }
.text-orange-800 { color: #fb923c; }
.text-orange-900 { color: #fb923c; }

.border { border-color: var(--border); }
.border-gray-300 { border-color: var(--border); }
.border-red-200 { border-color: rgba(248, 113, 113, 0.3); }
.border-yellow-200 { border-color: rgba(251, 191, 36, 0.3); }
.border-green-200 { border-color: rgba(52, 211, 153, 0.3); }
.border-purple-200 { border-color: rgba(139, 92, 246, 0.3); }
.border-blue-200 { border-color: rgba(79, 140, 255, 0.3); }
.border-orange-200 { border-color: rgba(251, 146, 60, 0.3); }

.bg-red-100 { background: rgba(248, 113, 113, 0.2); }
.bg-yellow-100 { background: rgba(251, 191, 36, 0.2); }
.bg-green-100 { background: rgba(52, 211, 153, 0.2); }

.bg-blue-600 { background: var(--accent); }
.hover\:bg-blue-700:hover { background: #3b82f6; }
.bg-gray-400 { background: var(--muted); }

.shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2); }

.rounded-lg { border-radius: var(--radius); }
.rounded-md { border-radius: 6px; }

.p-4 { padding: 1rem; }
.p-6 { padding: 1.5rem; }
.p-3 { padding: 0.75rem; }
.p-2 { padding: 0.5rem; }

.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }

.w-full { width: 100%; }
.max-w-2xl { max-width: 42rem; }

.h-2 { height: 0.5rem; }

.text-sm { font-size: 0.875rem; }
.text-xs { font-size: 0.75rem; }

.text-2xl { font-size: 1.5rem; }
.text-3xl { font-size: 1.875rem; }

.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.font-bold { font-weight: 700; }

.block { display: block; }
.flex { display: flex; }

.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-between { justify-content: space-between; }

.space-y-4 > * + * { margin-top: 1rem; }
.space-x-4 > * + * { margin-left: 1rem; }

.gap-2 { gap: 0.5rem; }

.grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
.grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

@media (min-width: 768px) {
  .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .md\:grid-cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

}

  .lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}

.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.transition-colors { transition-property: color, background-color, border-color; transition-duration: 150ms; }
.transition-all { transition-property: all; transition-duration: 300ms; }

.disabled\:bg-gray-400:disabled { background: var(--muted); }
.disabled\:cursor-not-allowed:disabled { cursor: not-allowed; }

.focus\:ring-2:focus { box-shadow: 0 0 0 2px var(--accent); }
.focus\:border-transparent:focus { border-color: transparent; }

.rounded-full { border-radius: 9999px; }
.bg-gray-200 { background: var(--border2); }

input, select, button {
  background: var(--surface);

}

  color: var(--muted);

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const VideoInput = ({ onSubmit, loading }) => {
  const [url, setUrl] = React.useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    if (url.trim()) {
      onSubmit(url.trim());
    }
  };

  return (
    <div className="w-full max-w-2xl mx-auto">
      <form onSubmit={handleSubmit} className="space-y-4">
        <div>
          <label htmlFor="video-url" className="block text-sm font-medium mb-2">
            YouTube Video URL
          </label>
          <input
            id="video-url"
            type="url"
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            placeholder="https://www.youtube.com/watch?v=..."
            className="w-full px-4 py-2 rounded-lg focus:ring-2 focus:border-transparent"
            disabled={loading}
          />
        </div>
        <button
          type="submit"
          disabled={!url.trim() || loading}
          className="w-full px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
        >
          {loading ? 'Processing Video...' : 'Analyze Video'}
        </button>
      </form>
    </div>
  );
};

const RiskPanel = ({ claim }) => {
  const getRiskLevel = (score) => {
    if (score >= 70) return { level: 'High', color: 'red' };
    if (score >= 40) return { level: 'Medium', color: 'yellow' };
    return { level: 'Low', color: 'green' };
  };

  const risk = getRiskLevel(claim.risk_score);

  return (
    <div className="border-t pt-4 mt-4">
      <h4 className="text-md font-medium mb-3">Risk Analysis</h4>
      
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className={`bg-${risk.color}-50 p-4 rounded-lg border border-${risk.color}-200`}>
          <div className="flex items-center justify-between">
            <span className={`text-${risk.color}-800 font-medium`}>Overall Risk</span>
            <span className={`text-2xl font-bold text-${risk.color}-900`}>
              {claim.risk_score.toFixed(0)}%
            </span>
          </div>
          <div className="mt-2">
            <div className="w-full bg-gray-200 rounded-full h-2">
              <div
                className={`bg-${risk.color}-600 h-2 rounded-full transition-all duration-300`}
                style={{ width: `${claim.risk_score}%` }}
              ></div>
            </div>
          </div>
        </div>

        <div className="bg-blue-50 p-4 rounded-lg border border-blue-200">
          <div className="flex items-center justify-between">
            <span className="text-blue-800 font-medium">Claim Validity</span>
            <span className="text-2xl font-bold text-blue-900">
              {claim.confidence ? (claim.confidence * 100).toFixed(0) : '50'}%
            </span>
          </div>
          <div className="mt-2">
            <div className="w-full bg-gray-200 rounded-full h-2">
              <div
                className="bg-blue-600 h-2 rounded-full transition-all duration-300"
                style={{ width: `${claim.confidence ? claim.confidence * 100 : 50}%` }}
              ></div>
            </div>
          </div>
        </div>

        <div className="bg-purple-50 p-4 rounded-lg border border-purple-200">
          <div className="flex items-center justify-between">
            <span className="text-purple-800 font-medium">Method Accuracy</span>
            <span className="text-2xl font-bold text-purple-900">
              {claim.method_accuracy ? (claim.method_accuracy * 100).toFixed(0) : '50'}%
            </span>
          </div>
          <div className="mt-2">
            <div className="w-full bg-gray-200 rounded-full h-2">
              <div
                className="bg-purple-600 h-2 rounded-full transition-all duration-300"
                style={{ width: `${claim.method_accuracy ? claim.method_accuracy * 100 : 50}%` }}
              ></div>
            </div>
          </div>
        </div>

        <div className="bg-orange-50 p-4 rounded-lg border border-orange-200">
          <span className="text-orange-800 font-medium block mb-2">Warnings</span>
          <div className="space-y-2">
            {claim.dataset_warning && (
              <div className="flex items-center">
                <div className="w-2 h-2 bg-orange-500 rounded-full mr-2"></div>
                <span className="text-sm text-orange-700">Dataset usage warning</span>
              </div>
            )}
            {claim.preprint_alert && (
              <div className="flex items-center">
                <div className="w-2 h-2 bg-purple-500 rounded-full mr-2"></div>
                <span className="text-sm text-purple-700">Preprint reliability alert</span>
              </div>
            )}
            {!claim.dataset_warning && !claim.preprint_alert && (
              <span className="text-sm text-gray-500">No specific warnings</span>
            )}
          </div>
        </div>
      </div>

      <div className="mt-4 p-4 bg-gray-50 rounded-lg">
        <h5 className="text-sm font-medium text-gray-700 mb-2">Risk Factors</h5>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
          <div className="flex items-center">
            <div className={`w-2 h-2 rounded-full mr-1 ${
              claim.risk_score >= 70 ? 'bg-red-500' : 'bg-gray-300'
            }`}></div>
            <span>High Risk Score</span>
          </div>
          <div className="flex items-center">
            <div className={`w-2 h-2 rounded-full mr-1 ${
              claim.confidence <= 0.5 ? 'bg-red-500' : 'bg-gray-300'
            }`}></div>
            <span>Low Validity</span>
          </div>
          <div className="flex items-center">
            <div className={`w-2 h-2 rounded-full mr-1 ${
              claim.method_accuracy <= 0.6 ? 'bg-red-500' : 'bg-gray-300'
            }`}></div>
            <span>Poor Method</span>
          </div>
          <div className="flex items-center">
            <div className={`w-2 h-2 rounded-full mr-1 ${
              claim.dataset_warning ? 'bg-orange-500' : 'bg-gray-300'
            }`}></div>
            <span>Dataset Issues</span>
          </div>
        </div>
      </div>
    </div>
  );
};

const YouTubeIngest = () => {
  const [transcript, setTranscript] = useState('');
  const [claims, setClaims] = useState([]);
  const [videoMetadata, setVideoMetadata] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState('all');
  const [stats, setStats] = useState({
    total_claims: 0,
    high_risk: 0,
    medium_risk: 0,
    low_risk: 0,
    misinformation: 0
  });

  const handleVideoSubmit = async (videoUrl) => {
    setLoading(true);
    try {
      const response = await fetch('/api/youtube/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: videoUrl })
      });
      const data = await response.json();
      setTranscript(data.transcript);
      setClaims(data.claims);
      setVideoMetadata(data.video_metadata);
      calculateStats(data.claims);
    } catch (error) {
      console.error('Error processing video:', error);
    } finally {
      setLoading(false);
    }
  };

  const calculateStats = (claimsData) => {
    const stats = {
      total_claims: claimsData.length,
      high_risk: claimsData.filter(c => c.risk_score >= 70).length,
      medium_risk: claimsData.filter(c => c.risk_score >= 40 && c.risk_score < 70).length,
      low_risk: claimsData.filter(c => c.risk_score < 40).length,
      misinformation: claimsData.filter(c => c.is_misinformation).length
    };
    setStats(stats);
  };

  const filteredClaims = claims.filter(claim => {
    if (filter === 'all') return true;
    if (filter === 'high') return claim.risk_score >= 70;
    if (filter === 'medium') return claim.risk_score >= 40 && claim.risk_score < 70;
    if (filter === 'low') return claim.risk_score < 40;
    if (filter === 'misinformation') return claim.is_misinformation;
    return true;
  });

  return (
    <div className="container">
      <h1 className="text-3xl font-bold mb-6">YouTube Misinformation Analysis</h1>
      
      <VideoInput onSubmit={handleVideoSubmit} loading={loading} />

      {videoMetadata && (
        <div className="mt-8 mb-6">
          <h2 className="text-2xl font-semibold mb-4">Video Information</h2>
          <div className="bg-white p-6 rounded-lg shadow">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <div>
                <p className="text-sm text-gray-500">Title</p>
                <p className="font-medium truncate">{videoMetadata.title}</p>
              </div>
              <div>
                <p className="text-sm text-gray-500">Duration</p>
                <p className="font-medium">{videoMetadata.duration}</p>
              </div>
              <div>
                <p className="text-sm text-gray-500">Words</p>
                <p className="font-medium">{videoMetadata.word_count}</p>
              </div>
              <div>
                <p className="text-sm text-gray-500">Method</p>
                <p className="font-medium">{videoMetadata.transcript_method}</p>
              </div>
            </div>
          </div>
        </div>
      )}

      {claims.length > 0 && (
        <>
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
            <div className="bg-white p-4 rounded-lg shadow">
              <h3 className="text-sm font-medium text-gray-500">Total Claims</h3>
              <p className="text-2xl font-bold text-gray-900">{stats.total_claims}</p>
            </div>
            <div className="bg-red-50 p-4 rounded-lg shadow">
              <h3 className="text-sm font-medium text-red-500">High Risk</h3>
              <p className="text-2xl font-bold text-red-900">{stats.high_risk}</p>
            </div>
            <div className="bg-yellow-50 p-4 rounded-lg shadow">
              <h3 className="text-sm font-medium text-yellow-500">Medium Risk</h3>
              <p className="text-2xl font-bold text-yellow-900">{stats.medium_risk}</p>
            </div>
            <div className="bg-green-50 p-4 rounded-lg shadow">
              <h3 className="text-sm font-medium text-green-500">Low Risk</h3>
              <p className="text-2xl font-bold text-green-900">{stats.low_risk}</p>
            </div>
            <div className="bg-purple-50 p-4 rounded-lg shadow">
              <h3 className="text-sm font-medium text-purple-500">Misinformation</h3>
              <p className="text-2xl font-bold text-purple-900">{stats.misinformation}</p>
            </div>
          </div>

          <div className="mb-6">
            <label className="block text-sm font-medium mb-2">Filter Claims</label>
            <select
              value={filter}
              onChange={(e) => setFilter(e.target.value)}
              className="block w-full md:w-64 px-3 py-2 rounded-md"
            >
              <option value="all">All Claims</option>
              <option value="high">High Risk</option>
              <option value="medium">Medium Risk</option>
              <option value="low">Low Risk</option>
              <option value="misinformation">Misinformation Only</option>
            </select>
          </div>

          <div className="space-y-4">
            {filteredClaims.map((claim) => (
              <div key={claim.id} className="bg-white p-6 rounded-lg shadow">
                <div className="flex justify-between items-start mb-4">
                  <h3 className="text-lg font-medium">{claim.text}</h3>
                  <span className={`px-2 py-1 rounded text-xs font-medium ${
                    claim.risk_score >= 70 ? 'bg-red-100 text-red-800' :
                    claim.risk_score >= 40 ? 'bg-yellow-100 text-yellow-800' :
                    'bg-green-100 text-green-800'
                  }`}>
                    Risk: {claim.risk_score.toFixed(0)}%
                  </span>
                </div>
                
                {claim.is_misinformation && (
                  <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <span className="text-red-800 font-medium text-sm">⚠️ Misinformation Detected</span>
                  </div>
                )}
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                  <div>
                    <p className="text-sm text-gray-500">Domain</p>
                    <p className="font-medium">{claim.domain}</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Claim Type</p>
                    <p className="font-medium">{claim.claim_type}</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Confidence</p>
                    <p className="font-medium">{claim.confidence ? (claim.confidence * 100).toFixed(0) : '50'}%</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Validation</p>
                    <p className="font-medium">{claim.validation_result}</p>
                  </div>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                  <div>
                    <p className="text-sm text-gray-500">Method Accuracy</p>
                    <p className="font-medium">{claim.method_accuracy ? (claim.method_accuracy * 100).toFixed(0) : '50'}%</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Evidence Count</p>
                    <p className="font-medium">{claim.evidence_count}</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Research Grade</p>
                    <p className="font-medium">{claim.research_grade ? 'Yes' : 'No'}</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">Analysis Method</p>
                    <p className="font-medium">{claim.analysis_method}</p>
                  </div>
                </div>

                <RiskPanel claim={claim} />

                {claim.context && (
                  <div className="mt-4 p-3 bg-gray-50 rounded-lg">
                    <p className="text-sm font-medium text-gray-700 mb-1">Context</p>
                    <p className="text-sm text-gray-600 italic">{claim.context}</p>
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {transcript && !loading && claims.length === 0 && (
        <div className="mt-8">
          <h2 className="text-xl font-semibold mb-2">Transcript</h2>
          <div className="bg-gray-100 p-4 rounded-lg max-h-96 overflow-y-auto">
            {transcript}
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.render(<YouTubeIngest />, document.getElementById('root'));
</script>
</body>
